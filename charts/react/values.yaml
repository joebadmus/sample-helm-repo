# Namespace configuration
namespace:
  name: react-app
  create: true

replicaCount: 1

image:
  repository: your-org/react-app   # replace with your image
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 3000
  targetPort: 3000

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

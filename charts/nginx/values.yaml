# Namespace configuration
namespace:
  name: test
  create: true

# Replica count for the nginx deployment
replicaCount: 1

# Nginx image configuration
image:
  repository: nginx
  tag: "1.25.3"
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: NodePort
  port: 8081
  targetPort: 80

# Resource limits and requests
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10
